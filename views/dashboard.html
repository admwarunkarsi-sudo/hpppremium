<div class="w-full mx-auto flex flex-col min-h-full relative animate-fadeIn p-3 sm:p-4 md:p-8 space-y-5">
    
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-end gap-3">
        <div>
            <h2 class="text-xl font-extrabold text-slate-800">🏠 Selamat Datang!</h2>
            <p class="text-sm text-slate-500 font-medium mt-1">Pantau semua resep dan stok bahan Anda di sini.</p>
        </div>
        <a href="#/hpp" class="px-4 py-2.5 bg-wa-800 text-white rounded-xl text-sm font-bold hover:bg-wa-900 transition-colors shadow-md flex items-center gap-2 w-full sm:w-auto justify-center">
            <i data-lucide="calculator" class="w-4 h-4"></i> Hitung HPP Sekarang
        </a>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
        <div class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm flex items-center gap-3 hover:shadow-md transition-shadow">
            <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center shrink-0">
                <i data-lucide="database" class="w-5 h-5"></i>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 mb-0.5">Jenis Bahan</p>
                <h3 class="text-2xl font-black text-slate-800" id="statTotalBahan">0</h3>
            </div>
        </div>
        
        <div class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm flex items-center gap-3 hover:shadow-md transition-shadow">
            <div class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center shrink-0">
                <i data-lucide="book" class="w-5 h-5"></i>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 mb-0.5">Resep Tersimpan</p>
                <h3 class="text-2xl font-black text-slate-800" id="statTotalResep">0</h3>
            </div>
        </div>

        <div class="col-span-2 md:col-span-1 bg-white rounded-2xl p-4 border border-slate-200 shadow-sm flex items-center gap-3 hover:shadow-md transition-shadow">
            <div class="w-10 h-10 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center shrink-0">
                <i data-lucide="trending-up" class="w-5 h-5"></i>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 mb-0.5">Status</p>
                <h3 class="text-base font-black text-slate-800">✅ Aktif</h3>
            </div>
        </div>
    </div>

    <!-- Recent Recipes -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col flex-1">
        <div class="p-4 border-b border-slate-100 flex justify-between items-center">
            <h3 class="font-extrabold text-slate-800 flex items-center gap-2 text-sm">
                <i data-lucide="history" class="w-4 h-4 text-wa-600"></i> Resep Tersimpan
            </h3>
            <a href="#/hpp" class="text-xs font-bold text-wa-600 hover:text-wa-800 transition-colors">Buka Kalkulator →</a>
        </div>
        <div class="p-0">
            <ul id="listRecentRecipes" class="divide-y divide-slate-100">
                <!-- Injected via JS -->
            </ul>
            <div id="emptyRecentRecipes" class="hidden flex-col items-center justify-center p-10 text-slate-400">
                <i data-lucide="inbox" class="w-10 h-10 mb-3 opacity-50"></i>
                <p class="font-medium text-sm">Belum ada resep tersimpan.</p>
                <p class="text-xs mt-1">Buat resep pertama Anda di menu Hitung HPP!</p>
            </div>
        </div>
    </div>

</div>
