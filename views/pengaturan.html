<div class="w-full max-w-4xl mx-auto flex flex-col min-h-full relative animate-fadeIn p-3 sm:p-4 md:p-8 space-y-4 sm:space-y-6">
    
    <div class="flex flex-col sm:flex-row justify-between sm:items-end gap-3 mb-2">
        <div>
            <h2 class="text-xl font-extrabold text-slate-800">⚙️ Pengaturan</h2>
            <p class="text-sm text-slate-500 font-medium mt-1">Atur nama-nama kelompok bahan baku (kategori) supaya rapi.</p>
        </div>
    </div>

    <!-- Category Settings -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col flex-1 overflow-hidden">
        <div class="p-4 sm:p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <h3 class="font-extrabold text-slate-800 flex items-center gap-2 text-sm sm:text-base">
                <i data-lucide="tags" class="w-4 h-4 text-wa-600"></i> Kelompok Jenis Bahan
            </h3>
        </div>

        <div class="p-4 sm:p-5 border-b border-slate-100">
            <form id="formAddKategori" class="flex flex-col sm:flex-row items-center gap-3">
                <div class="w-full sm:flex-1 relative">
                    <i data-lucide="tag" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    <input type="text" id="inpNamaKategori" required placeholder="Contoh: Sayuran, Daging, Bumbu..." class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-wa-500 focus:ring-2 focus:ring-wa-500/20 transition-all uppercase">
                </div>
                <button type="submit" class="w-full sm:w-auto px-5 py-2.5 bg-wa-800 text-white rounded-xl text-sm font-bold hover:bg-wa-900 transition-colors shadow-md flex items-center justify-center gap-2 shrink-0">
                    <i data-lucide="plus" class="w-4 h-4"></i> Tambah
                </button>
            </form>
        </div>

        <!-- Table Container -->
        <div class="flex-1 overflow-auto bg-slate-50/50 p-2 sm:p-0 min-h-[300px]">
            <table class="w-full text-left text-sm text-slate-600 bg-white sm:rounded-none rounded-xl shadow-sm sm:shadow-none border border-slate-100 sm:border-none">
                <thead class="text-[11px] sm:text-xs uppercase bg-slate-50 text-slate-500 font-bold sticky top-0 shadow-sm z-10 border-b border-slate-100 sm:border-none">
                    <tr>
                        <th class="p-3 sm:px-6 sm:py-4">Nama Kelompok (Kategori)</th>
                        <th class="p-3 sm:px-6 sm:py-4 text-center w-24 sm:w-32">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBodyKategori" class="divide-y divide-slate-100">
                    <!-- Rows injected via JS -->
                </tbody>
            </table>
            <div id="emptyStateKategori" class="hidden flex flex-col items-center justify-center p-12 text-slate-400">
                <i data-lucide="inbox" class="w-12 h-12 mb-3"></i>
                <p class="font-medium text-sm">Belum ada kelompok yang ditambahkan.</p>
            </div>
        </div>
    </div>

</div>
