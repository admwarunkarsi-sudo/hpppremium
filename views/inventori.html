<div class="w-full mx-auto flex flex-col min-h-full relative animate-fadeIn p-3 sm:p-4 md:p-8">
    
    <div class="flex flex-col sm:flex-row justify-between sm:items-end gap-3 mb-4 sm:mb-6">
        <div>
            <h2 class="text-xl font-extrabold text-slate-800">📦 Cek Stok Barang</h2>
            <p class="text-sm text-slate-500 font-medium mt-1">Catat sisa bahan baku di dapur agar tahu kapan harus belanja lagi.</p>
        </div>
        <button id="btnSimpanInventori" class="w-full sm:w-auto px-5 py-2.5 bg-wa-800 text-white rounded-xl text-sm font-bold hover:bg-wa-900 transition-colors shadow-md flex items-center justify-center gap-2">
            <i data-lucide="save" class="w-4 h-4"></i> Simpan Catatan Stok
        </button>
    </div>

    <!-- Table Container -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 flex-1 flex flex-col">
        <!-- Search and Filter -->
        <div class="p-3 sm:p-4 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 bg-slate-50 rounded-t-2xl">
            <div class="relative w-full sm:max-w-sm">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                <input type="text" id="inpSearchInventori" placeholder="Cari nama barang..." class="w-full pl-9 pr-3 py-2.5 bg-white border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-wa-500/20 focus:border-wa-500 outline-none transition-all">
            </div>
            <div class="flex gap-2 items-center w-full sm:w-auto">
                <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider hidden sm:inline">Kondisi:</span>
                <select id="selStatusInventori" class="w-full sm:w-auto px-4 py-2.5 border border-slate-300 rounded-xl text-sm text-slate-700 bg-white font-medium focus:ring-2 focus:ring-wa-500/20 outline-none">
                    <option value="all">Semua Barang</option>
                    <option value="low">Stok Mau Habis</option>
                    <option value="empty">Stok Kosong</option>
                </select>
            </div>
        </div>

        <!-- Table Desktop / Responsive Container -->
        <div class="flex-1 overflow-auto bg-slate-50/50 p-2 sm:p-0">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-slate-600 bg-white sm:rounded-none rounded-xl shadow-sm sm:shadow-none border border-slate-100 sm:border-none">
                    <thead class="text-[11px] sm:text-xs uppercase bg-slate-50 text-slate-500 font-bold sticky top-0 shadow-sm z-10 border-b border-slate-100 sm:border-none">
                        <tr>
                            <th class="p-3 sm:px-6 sm:py-4">Nama Barang</th>
                            <th class="hidden sm:table-cell p-3 sm:px-6 sm:py-4">Jenis</th>
                            <th class="p-3 sm:px-6 sm:py-4 text-center">Sisa di Dapur</th>
                            <th class="p-3 sm:px-6 sm:py-4">Status Ketersediaan</th>
                        </tr>
                    </thead>
                    <tbody id="tableBodyInventori" class="divide-y divide-slate-100">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
            </div>
            <div id="emptyStateInventori" class="hidden flex flex-col items-center justify-center p-12 text-slate-400">
                <i data-lucide="inbox" class="w-12 h-12 mb-3"></i>
                <p class="font-medium text-sm text-center">Belum ada data barang.<br>Tambahkan dulu di menu Daftar Belanja (Bahan Baku).</p>
            </div>
        </div>
    </div>

</div>
